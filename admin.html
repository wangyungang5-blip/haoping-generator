<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>酒店端后台 - 点评积分审核</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:#f4f6fb;min-height:100vh;padding:18px;color:#222}.wrap{max-width:980px;margin:0 auto}.top{background:linear-gradient(135deg,#202c59,#667eea);color:#fff;border-radius:18px;padding:22px;margin-bottom:16px;box-shadow:0 8px 24px rgba(32,44,89,.18)}.top h1{font-size:22px;margin-bottom:6px}.top p{font-size:13px;opacity:.88}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}.stat{background:#fff;border-radius:14px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.06)}.stat b{font-size:24px;display:block;color:#2B7DE9}.stat span{font-size:12px;color:#666}.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.06)}.card h2{font-size:17px;margin-bottom:12px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.btn{border:none;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer}.btn.primary{background:#4CAF50;color:#fff}.btn.blue{background:#2B7DE9;color:#fff}.btn.gray{background:#eef1f8;color:#333}.btn.red{background:#ffe8e8;color:#b42318}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 8px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}th{color:#667;font-size:12px}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#fff3cd;color:#856404;font-size:12px}.pill.ok{background:#e8f8ed;color:#15803d}.muted{color:#777;font-size:12px;line-height:1.7}.search{width:260px;max-width:100%;padding:10px;border:1px solid #ddd;border-radius:10px}.right-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.right{border:1px solid #eee;border-radius:12px;padding:12px;background:#fafafa}.right strong{display:block;margin-bottom:4px}.redeem-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.redeem-card{border:1px solid #eee;border-radius:12px;padding:12px;background:#fafafa}.redeem-card.ok{background:#f0fff2;border-color:#7ccf8b}.redeem-card button{margin-top:8px;width:100%}.member-highlight{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(135deg,#fff7db,#fff);border:1px solid #ffe6a3;border-radius:14px;padding:14px;margin-bottom:12px}.member-highlight .phone{font-size:14px;color:#666}.member-highlight .points{font-size:38px;font-weight:900;color:#b56a00;line-height:1}.member-highlight .label{font-size:12px;color:#8a5a00;text-align:right}.empty{text-align:center;color:#999;padding:24px}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.right-grid,.redeem-list{grid-template-columns:1fr 1fr}table{font-size:12px}.wrap{max-width:100%}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🏨 酒店端后台 · 点评积分审核</h1>
    <p id="hotelText">用于查看扫码漏斗、审核点评截图、发放积分、查询会员权益。正式版接腾讯云后支持账号登录和多门店权限。</p>
  </div>
  <div class="grid" id="statsGrid"></div>
  <div class="card">
    <h2>待审核点评凭证</h2>
    <div class="toolbar">
      <input class="search" id="phoneSearch" placeholder="输入手机号查询会员/积分" oninput="render()">
      <button class="btn blue" onclick="location.href='index.html'+location.search">打开客人端</button>
      <button class="btn gray" onclick="render()">刷新数据</button>
      <button class="btn red" onclick="clearDemo()">清空本机演示数据</button>
    </div>
    <table>
      <thead><tr><th>客人</th><th>平台/酒店</th><th>凭证</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="reviewRows"></tbody>
    </table>
  </div>
  <div class="card">
    <h2>会员积分查询 / 权益核销</h2>
    <div id="memberBox" class="muted">输入手机号后显示会员积分、可核销权益和核销记录。</div>
  </div>
  <div class="card">
    <h2>权益规则</h2>
    <div class="right-grid">
      <div class="right"><strong>10积分 · 早餐券</strong><span class="muted">下次入住可兑换 1 份早餐</span></div>
      <div class="right"><strong>20积分 · 延迟退房券</strong><span class="muted">视当日房态使用</span></div>
      <div class="right"><strong>30积分 · 升房券</strong><span class="muted">视当日房态升级</span></div>
      <div class="right"><strong>50积分 · 房费抵扣券</strong><span class="muted">金额由酒店配置</span></div>
    </div>
  </div>
</div>
<script>
const RIGHTS=[{points:10,name:'早餐券'},{points:20,name:'延迟退房券'},{points:30,name:'升房券'},{points:50,name:'房费抵扣券'}];
const HOTEL_CONFIGS={default:{name:'默认酒店',rewardPoints:10},hotel001:{name:'测试酒店A',rewardPoints:10},hotel002:{name:'测试酒店B',rewardPoints:10}};
function qs(){return new URLSearchParams(location.search)}function hotelId(){return qs().get('hotel_id')||'default'}function hotel(){return HOTEL_CONFIGS[hotelId()]||{name:'专属酒店',rewardPoints:10}}function key(n){return 'qr_review_points_'+n}function read(n,f){try{return JSON.parse(localStorage.getItem(key(n)))||f}catch(e){return f}}function write(n,v){localStorage.setItem(key(n),JSON.stringify(v))}function now(){return new Date().toLocaleString('zh-CN',{hour12:false})}
function approve(id){const rs=read('reviews',[]), ms=read('members',{}); const r=rs.find(x=>x.id===id); if(!r||r.status==='approved')return; r.status='approved'; r.approvedAt=now(); const m=ms[r.phone]||{points:0,logs:[]}; m.points=(m.points||0)+(r.points||10); m.logs=m.logs||[]; m.logs.push({time:now(),text:`${r.hotel_name||hotel().name} 完成真实入住反馈 +${r.points||10}积分`}); ms[r.phone]=m; write('reviews',rs); write('members',ms); const st=read('stats',{}); st[hotelId()]=st[hotelId()]||{}; st[hotelId()].approved=(st[hotelId()].approved||0)+1; write('stats',st); render()}
function reject(id){const rs=read('reviews',[]); const r=rs.find(x=>x.id===id); if(r){r.status='rejected'; r.rejectedAt=now(); write('reviews',rs)} render()}
function clearDemo(){if(confirm('确认清空本机演示数据？正式版不会这样粗暴，演示版才这么干。')){localStorage.removeItem(key('reviews'));localStorage.removeItem(key('members'));localStorage.removeItem(key('stats'));render()}}

function importReviewFromHash(){
  if(!location.hash || !location.hash.startsWith('#review=')) return;
  try{
    const raw=decodeURIComponent(location.hash.slice(8));
    const item=JSON.parse(decodeURIComponent(escape(atob(raw))));
    const rs=read('reviews',[]);
    if(!rs.some(x=>x.id===item.id)){
      rs.push(item); write('reviews',rs);
      const st=read('stats',{}); st[hotelId()]=st[hotelId()]||{}; st[hotelId()].proof=(st[hotelId()].proof||0)+1; write('stats',st);
      alert('已导入 1 条客人点评凭证，下面可以审核通过并发积分。');
    }
    history.replaceState(null,'',location.pathname+location.search);
  }catch(e){ alert('导入点评凭证失败，请重新从客人端提交。'); }
}
function render(){document.getElementById('hotelText').textContent=`当前酒店：${hotel().name}（hotel_id: ${hotelId()}）｜正式版接腾讯云后支持账号登录和多门店权限。`; const st=(read('stats',{})[hotelId()]||{}); const stats=[['扫码',st.scan||0],['生成',st.generate||0],['复制',st.copy||0],['跳转',st.jump||0],['上传凭证',st.proof||0],['审核通过',st.approved||0]]; document.getElementById('statsGrid').innerHTML=stats.map(x=>`<div class="stat"><b>${x[1]}</b><span>${x[0]}</span></div>`).join(''); const phone=document.getElementById('phoneSearch').value.trim(); let rows=read('reviews',[]).filter(x=>x.hotel_id===hotelId()); if(phone) rows=rows.filter(x=>(x.phone||'').includes(phone)); document.getElementById('reviewRows').innerHTML=rows.slice().reverse().map(r=>`<tr><td>${r.phone||'-'}<br><span class="muted">${r.time||''}</span></td><td>${r.platform||'-'}<br><span class="muted">${r.hotel_name||hotel().name}</span></td><td>${r.fileName||'已上传'}<br><span class="muted">${(r.text||'').slice(0,42)}...</span></td><td><span class="pill ${r.status==='approved'?'ok':''}">${r.status==='approved'?'已通过':r.status==='rejected'?'已驳回':'待审核'}</span><br><span class="muted">${r.points||10}积分</span></td><td>${r.status==='approved'?'已发放':`<button class="btn primary" onclick="approve('${r.id}')">通过并发积分</button> <button class="btn red" onclick="reject('${r.id}')">驳回</button>`}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">暂无点评凭证</td></tr>'; renderMember(phone)}

function redeem(phone, points, name){
  if(!phone){alert('先输入手机号。');return}
  const ms=read('members',{}); const m=ms[phone]||{points:0,logs:[]};
  if((m.points||0)<points){alert('积分不够，别硬核销，前台容易挨骂。');return}
  if(!confirm(`确认核销【${name}】？将扣除 ${points} 积分。`)) return;
  m.points=(m.points||0)-points; m.logs=m.logs||[];
  m.logs.push({time:now(),text:`核销 ${name} -${points}积分`});
  ms[phone]=m; write('members',ms); render();
}
function renderMember(phone){
  const box=document.getElementById('memberBox');
  if(!phone){box.textContent='输入手机号后显示会员积分、可核销权益和核销记录。';return}
  const m=read('members',{})[phone]||{points:0,logs:[]};
  const points=m.points||0;
  const masked=phone.replace(/(\d{3})\d+(\d{4})/,'$1****$2');
  const cards=RIGHTS.map(r=>{
    const ok=points>=r.points;
    return `<div class="redeem-card ${ok?'ok':''}"><strong>${r.points}积分 · ${r.name}</strong><div class="muted">${ok?'可核销':'还差 '+(r.points-points)+' 分'}</div><button class="btn ${ok?'primary':'gray'}" ${ok?'':'disabled'} onclick="redeem('${phone}',${r.points},'${r.name}')">核销${r.name}</button></div>`
  }).join('');
  box.innerHTML=`<div class="member-highlight"><div><div class="phone">会员手机号</div><strong>${masked}</strong></div><div><div class="label">当前可用积分</div><div class="points">${points}</div></div></div><div class="redeem-list">${cards}</div><div style="margin-top:12px"><strong>积分/核销记录</strong><br>${(m.logs||[]).slice().reverse().map(l=>'• '+l.time+' '+l.text).join('<br>')||'暂无积分记录'}</div>`
}
document.addEventListener('DOMContentLoaded',()=>{importReviewFromHash();render();})
</script>
</body></html>
