<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>分享您的入住体验 ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px 16px 40px;
        }
        .container { max-width: 420px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0 20px; color: white; }
        .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .card {
            background: white; border-radius: 16px; padding: 20px 18px;
            margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 15px; font-weight: 600; color: #333;
            margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
        }
        .card-title .icon { font-size: 18px; }
        .rating-group { display: flex; gap: 10px; justify-content: center; }
        .rating-btn {
            flex: 1; height: 70px; border: 2px solid #e0e0e0; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; background: #fafafa;
            -webkit-tap-highlight-color: transparent; appearance: none; -webkit-appearance: none;
            font-family: inherit; touch-action: manipulation;
        }
        .rating-btn.active { border-color: #667eea; background: #f0f0ff; transform: scale(1.03); }
        .rating-btn .star { font-size: 22px; }
        .rating-btn .label { font-size: 11px; color: #666; margin-top: 2px; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-btn {
            padding: 9px 14px; border: 1.5px solid #e0e0e0; border-radius: 18px;
            background: #fafafa; cursor: pointer; font-size: 13px; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent; appearance: none; -webkit-appearance: none;
            font-family: inherit; touch-action: manipulation;
        }
        .tag-btn.active { border-color: #667eea; background: #667eea; color: white; }
        .platform-group { display: flex; gap: 8px; }
        .platform-btn {
            flex: 1; padding: 10px 8px; border: 1.5px solid #e0e0e0; border-radius: 10px;
            background: #fafafa; cursor: pointer; text-align: center; font-size: 13px;
            transition: all 0.2s; -webkit-tap-highlight-color: transparent;
            appearance: none; -webkit-appearance: none; font-family: inherit; touch-action: manipulation;
        }
        .platform-btn.active { border-color: #667eea; background: #f0f0ff; }
        .platform-btn .p-icon { font-size: 22px; display: block; margin-bottom: 3px; }
        .generate-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px; font-size: 17px;
            font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .generate-btn:active { transform: scale(0.98); }
        .generate-btn:disabled { background: #ccc; }
        .result-area { display: none; }
        .result-text {
            background: #f8f8ff; border: 1px solid #e8e8ff; border-radius: 12px;
            padding: 14px; font-size: 14px; line-height: 1.8; color: #333;
            min-height: 100px; word-break: break-all; user-select: all;
        }
        .action-btns { display: flex; gap: 10px; margin-top: 12px; }
        .copy-btn {
            flex: 1.5; padding: 13px; background: #4CAF50; color: white;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .copy-btn.copied { background: #45a049; }
        .regen-btn {
            flex: 1; padding: 13px; background: #667eea; color: white;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .jump-area { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px dashed #ddd; }
        .jump-title { font-size: 14px; color: #666; margin-bottom: 10px; text-align: center; }
        .jump-btns { display: flex; gap: 8px; }
        .jump-btn {
            flex: 1; padding: 12px 8px; border: none; border-radius: 10px;
            color: white; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .jump-btn .j-icon { font-size: 20px; display: block; margin-bottom: 3px; }
        .jump-btn.meituan { background: #FFC107; color: #333; }
        .jump-btn.ctrip { background: #2B7DE9; }
        .jump-btn.fliggy { background: #FF6B35; }
        .jump-hint {
            margin-top: 10px; padding: 10px; background: #fff3cd; border-radius: 8px;
            font-size: 12px; color: #856404; line-height: 1.6;
        }
        .footer { text-align: center; color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏨 分享您的入住体验</h1>
            <p>简单几步，一键生成好评文案</p>
        </div>

        <div class="card">
            <div class="card-title"><span class="icon">⭐</span> 您的满意度</div>
            <div class="rating-group">
                <button type="button" class="rating-btn" data-score="5" onclick="selectRating(this)">
                    <span class="star">⭐⭐⭐⭐⭐</span>
                    <span class="label">非常满意</span>
                </button>
                <button type="button" class="rating-btn" data-score="4" onclick="selectRating(this)">
                    <span class="star">⭐⭐⭐⭐</span>
                    <span class="label">满意</span>
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span class="icon">✨</span> 哪些方面让您满意？（可多选）</div>
            <div class="tag-group">
                <button type="button" class="tag-btn" data-tag="卫生" onclick="toggleTag(this)">🧹 卫生干净</button>
                <button type="button" class="tag-btn" data-tag="服务" onclick="toggleTag(this)">😊 服务热情</button>
                <button type="button" class="tag-btn" data-tag="交通" onclick="toggleTag(this)">🚇 交通便利</button>
                <button type="button" class="tag-btn" data-tag="性价比" onclick="toggleTag(this)">💰 性价比高</button>
                <button type="button" class="tag-btn" data-tag="设施" onclick="toggleTag(this)">🛋️ 设施齐全</button>
                <button type="button" class="tag-btn" data-tag="安静" onclick="toggleTag(this)">😴 安静舒适</button>
                <button type="button" class="tag-btn" data-tag="早餐" onclick="toggleTag(this)">🍳 早餐好吃</button>
                <button type="button" class="tag-btn" data-tag="床品" onclick="toggleTag(this)">🛏️ 床品舒服</button>
                <button type="button" class="tag-btn" data-tag="热水" onclick="toggleTag(this)">🚿 热水充足</button>
                <button type="button" class="tag-btn" data-tag="停车" onclick="toggleTag(this)">🅿️ 停车方便</button>
                <button type="button" class="tag-btn" data-tag="周边" onclick="toggleTag(this)">🎯 周边好玩</button>
                <button type="button" class="tag-btn" data-tag="WiFi" onclick="toggleTag(this)">📶 WiFi快</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span class="icon">📱</span> 发布到哪个平台？</div>
            <div class="platform-group">
                <button type="button" class="platform-btn active" data-platform="meituan" onclick="selectPlatform(this)">
                    <span class="p-icon">🦘</span>美团
                </button>
                <button type="button" class="platform-btn" data-platform="ctrip" onclick="selectPlatform(this)">
                    <span class="p-icon">🐬</span>携程
                </button>
                <button type="button" class="platform-btn" data-platform="fliggy" onclick="selectPlatform(this)">
                    <span class="p-icon">🐷</span>飞猪
                </button>
            </div>
        </div>

        <div class="card">
            <button class="generate-btn" id="generateBtn" onclick="generateReview()" disabled>
                🎉 一键生成好评文案
            </button>
        </div>

        <div class="card result-area" id="resultArea">
            <div class="card-title"><span class="icon">📝</span> 您的好评文案</div>
            <div class="result-text" id="resultText"></div>
            <div class="action-btns">
                <button class="copy-btn" id="copyBtn" onclick="copyAndJump()">📋 复制并跳转</button>
                <button class="regen-btn" onclick="generateReview()">🔄 换一种</button>
            </div>
            <div class="jump-area" id="jumpArea">
                <div class="jump-title">📍 下一步：去平台粘贴评价</div>
                <div class="jump-btns">
                    <button class="jump-btn meituan" onclick="jumpTo('meituan')">
                        <span class="j-icon">🦘</span>打开美团
                    </button>
                    <button class="jump-btn ctrip" onclick="jumpTo('ctrip')">
                        <span class="j-icon">🐬</span>打开携程
                    </button>
                    <button class="jump-btn fliggy" onclick="jumpTo('fliggy')">
                        <span class="j-icon">🐷</span>打开飞猪
                    </button>
                </div>
                <div class="jump-hint" id="jumpHint"></div>
            </div>
        </div>

        <div class="footer">感谢您的真实评价 ❤️</div>
    </div>

    <script>

        let selectedTags = [];
        let selectedPlatform = 'meituan';

        // ========================================

                "卫生做得特别用心，房间每天都有打扫。连矿泉水都换了新的，垃圾也及时清理了。这种服务态度真的值得五星！",
                "住过这么多酒店，这家卫生绝对排前三。地板拖得能照人，桌面没有水渍，垃圾桶每天都清空。细节决定品质！",

                schemes: ['fliggy://', 'taobaotravel://'],

                hint: '1. 文案已复制 ✅\n2. 点击上方"打开飞猪"\n3. 我的 → 全部订单 → 找到订单 → 评价 → 粘贴',
            }

        function safeTap(fn, el, ev) {
            if (ev) { ev.preventDefault(); ev.stopPropagation(); }
            fn(el);
        }

        function selectRating(el) {
            document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedRating = parseInt(el.dataset.score);
            updateBtn();
        }

        function toggleTag(el) {
            el.classList.toggle('active');
            const tag = el.dataset.tag;
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
            } else {
                selectedTags.push(tag);
            }
            updateBtn();
        }

        function selectPlatform(el) {
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedPlatform = el.dataset.platform;
        }

        function updateBtn() {
            document.getElementById('generateBtn').disabled = !(selectedRating > 0);
        }

        // 已使用的文案索引，避免重复
        let usedIndices = {};

        function generateReview() {
            let pool = [];

            // 根据选中的标签收集文案
            if (selectedTags.length > 0) {
                selectedTags.forEach(tag => {
                    if (reviews[tag]) {
                        pool = pool.concat(reviews[tag].map((text, i) => ({ text, tag, index: i })));
                    }
                });
            }

            // 如果标签池不够，补充通用文案
            if (pool.length < 5) {
                pool = pool.concat(reviews['通用'].map((text, i) => ({ text, tag: '通用', index: i })));
            }

            // 过滤已使用的
            let available = pool.filter(item => {
                const key = item.tag + '-' + item.index;
                return !usedIndices[key];
            });

            // 如果全部用完了，重置
            if (available.length === 0) {
                usedIndices = {};
                available = pool;
            }

            // 随机选一条
            const selected = available[Math.floor(Math.random() * available.length)];
            usedIndices[selected.tag + '-' + selected.index] = true;

            let text = selected.text;

            // 根据评分微调
            if (selectedRating === 4) {
                text = text.replace(/五星好评/g, '好评').replace(/满分/g, '高分').replace(/五星/g, '四星');
                text = text.replace(/超出预期/g, '符合预期').replace(/太惊喜了/g, '还不错');
            }

            document.getElementById('resultText').textContent = text;
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('jumpArea').style.display = 'block';

            highlightJumpBtn(selectedPlatform);
            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'center' });

            const copyBtn = document.getElementById('copyBtn');
            copyBtn.textContent = '📋 复制并跳转';
            copyBtn.classList.remove('copied');
        }

        function highlightJumpBtn(platform) {
            document.querySelectorAll('.jump-btn').forEach(btn => {
                btn.style.opacity = '0.4';
                btn.style.transform = 'scale(0.95)';
            });
            const activeBtn = document.querySelector(`.jump-btn.${platform}`);
            if (activeBtn) {
                activeBtn.style.opacity = '1';
                activeBtn.style.transform = 'scale(1)';
            }
            const config = platformConfig[platform];
            document.getElementById('jumpHint').innerHTML = `💡 <strong>操作指引：</strong><br>${config.hint.replace(/\n/g, '<br>')}`;
        }

        async function copyAndJump() {
            const text = document.getElementById('resultText').textContent;
            try {
                await navigator.clipboard.writeText(text);
            } catch (e) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }

            const copyBtn = document.getElementById('copyBtn');
            copyBtn.textContent = '✅ 已复制！';
            copyBtn.classList.add('copied');

            document.getElementById('jumpArea').style.display = 'block';
            highlightJumpBtn(selectedPlatform);

            // 1.5秒后自动尝试跳转
            setTimeout(() => jumpTo(selectedPlatform), 1500);
        }

        function jumpTo(platform) {
            const config = platformConfig[platform];
            if (!config) return;

            // 现实很骨感：外部H5无法稳定直达美团/携程/飞猪“小程序点评页”。
            // 这里做两件事：1）先尝试拉起App；2）失败后打开网页版/给手动路径。
            const hintBox = document.getElementById('jumpHint');
            hintBox.innerHTML = `💡 <strong>已复制文案。</strong><br>${config.hint.replace(/\n/g, '<br>')}<br><br>如果没有自动打开，请手动打开${config.name} App/小程序，进入订单评价。`;

            const scheme = config.schemes[0];
            const start = Date.now();

            // iOS/安卓浏览器对 scheme 支持都很抽风，尤其微信里会拦截。
            try {
                window.location.href = scheme;
            } catch (e) {}

            // 如果没有离开当前页面，2秒后给网页版兜底。
            setTimeout(() => {
                if (Date.now() - start < 2600) {
                    try {
                        window.open(config.webUrl, '_blank');
                    } catch (e) {
                        window.location.href = config.webUrl;
                    }
                }
            }, 2000);
        }
    </script>
